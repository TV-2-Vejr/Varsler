name: Update MeteoAlarm KML

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests simplekml feedparser

      - name: Run script
        run: python update_kml.py

      - name: Commit and push
        run: |
          git config --global user.name 'MeteoBot'
          git config --global user.email 'bot@github.com'
          touch meteoalarm_warnings.kml
          git add meteoalarm_warnings.kml
          if git diff --cached --quiet; then
            echo "Ingen ændringer fundet."
          else
            git commit -m "Update weather warnings KML [skip ci]"
            git push
          fi
