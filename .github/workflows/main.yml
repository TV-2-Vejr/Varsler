name: Update MeteoAlarm KML

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests simplekml

      - name: Run script
        run: python update_kml.py

      - name: Check file existence
        run: |
          if [ -f meteoalarm_warnings.kml ]; then
            echo "KML fil fundet!"
            ls -l meteoalarm_warnings.kml
          else
            echo "KML fil blev ikke oprettet af scriptet."
            exit 0 # Vi stopper pænt her uden fejlmeddelelse i Git
          fi

      - name: Commit and push
        run: |
          git config --global user.name 'MeteoBot'
          git config --global user.email 'bot@github.com'
          git add meteoalarm_warnings.kml
          # Commit kun hvis der er ændringer (ellers fejler push)
          if git diff --cached --quiet; then
            echo "Ingen ændringer i data siden sidst."
          else
            git commit -m "Update weather warnings KML"
            git push
          fi
